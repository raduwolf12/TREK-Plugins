name: Publish registry

on:
  push:
    branches: [main]
    paths:
      - 'registry/plugins/**'

permissions:
  contents: write

jobs:
  publish:
    if: github.event.repository.fork != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci

      - name: Determine changed entries
        id: changed
        run: |
          before="${{ github.event.before }}"
          if ! git rev-parse --verify "$before^{commit}" >/dev/null 2>&1; then
            before="$(git rev-list --max-parents=0 HEAD | tail -1)"
          fi
          files="$(git diff --name-only "$before" HEAD -- 'registry/plugins/*.json' || true)"
          {
            echo "files<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stamp reviewedAt + bind owners
        env:
          CHANGED: ${{ steps.changed.outputs.files }}
        run: |
          today="$(date -u +%Y-%m-%d)"
          echo "$CHANGED" | xargs -r env TODAY="$today" node scripts/publish-stamp.mjs

      - name: Rebuild aggregated dist/index.json
        run: node build/aggregate.mjs

      - name: Commit generated files
        run: |
          if git diff --quiet dist/ OWNERS.json registry/; then
            echo "nothing to publish"; exit 0
          fi
          git config user.name "trek-plugins-bot"
          git config user.email "bot@users.noreply.github.com"
          git add dist/ OWNERS.json registry/
          git commit -m "chore(registry): publish dist/index.json + stamp reviewedAt [skip ci]"
          git push
